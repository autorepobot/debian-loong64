name: build Debian 13 loong64 qcow2

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-qcow2:
    name: build loong64 qcow2 full-system
    runs-on: ubuntu-24.04

    env:
      ISO_FILE: debian-loong64-netinst.iso
      QCOW2_IMAGE: debian-trixie-loong64.qcow2
      IMAGE_SIZE: 20G

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ inputs.release_tag }}"
          RELEASE="${{ inputs.release }}"

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE=${RELEASE}" >> "$GITHUB_ENV"

          echo "RELEASE_TAG=${RELEASE_TAG}"
          echo "RELEASE=${RELEASE}"

      - name: Prepare host tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-misc \
            qemu-utils \
            wget \
            curl \
            xz-utils \
            cpio \
            gzip \
            p7zip-full \
            openssh-client \
            sshpass \
            rsync \
            jq \
            ca-certificates

          qemu-system-loongarch64 --version

      - name: Download Debian loong64 netinst ISO
        shell: bash
        run: |
          set -euo pipefail

          URLS=(
            "https://mirrors.opensrc.us.ci/debian-loong64-cd/13.4.0/loong64/iso-cd/debian-13.4.0-loong64-netinst.iso"
            "https://loong13.debian.net/debian-loong64-cd/13.4.0/loong64/iso-cd/debian-13.4.0-loong64-netinst.iso"
          )

          success=0

          for url in "${URLS[@]}"; do
            echo "Try ISO mirror:"
            echo "  $url"

            for i in {1..5}; do
              echo "Attempt $i"

              if wget \
                -4 \
                -c \
                --timeout=60 \
                --tries=3 \
                --waitretry=10 \
                -O "$ISO_FILE" \
                "$url"; then
                success=1
                break 2
              fi

              sleep 15
            done
          done

          [[ "$success" -eq 1 ]] || {
            echo "All ISO mirrors failed"
            exit 1
          }

          ls -lh "$ISO_FILE"

      - name: Extract installer kernel and initrd
        shell: bash
        run: |
          set -euo pipefail

          rm -rf iso boot initrd-work
          mkdir -p iso boot initrd-work

          7z x "$ISO_FILE" -oiso >/dev/null

          KERNEL="$(
            find iso -type f \( -name 'vmlinux' -o -name 'linux' -o -name 'vmlinuz' \) \
              -exec sh -c 'file "$1" | grep -q ELF && echo "$1"' sh {} \; \
              | head -n1
          )"

          INITRD="$(
            find iso -type f \( -name 'initrd.gz' -o -name 'initrd' \) \
              | head -n1
          )"

          [[ -n "$KERNEL" ]] || { echo "No ELF installer kernel found"; find iso -type f | sort | head -200; exit 1; }
          [[ -n "$INITRD" ]] || { echo "No installer initrd found"; find iso -type f | sort | head -200; exit 1; }

          cp "$KERNEL" boot/vmlinux
          cp "$INITRD" boot/initrd.gz

          file boot/vmlinux
          ls -lh boot/initrd.gz

      - name: Create preseed file
        shell: bash
        run: |
          set -euo pipefail

          cat > preseed.cfg <<'EOF'
          d-i debian-installer/locale string en_US.UTF-8
          d-i keyboard-configuration/xkb-keymap select us
          d-i netcfg/choose_interface select auto
          d-i netcfg/get_hostname string loong64-builder
          d-i netcfg/get_domain string local

          d-i mirror/country string manual
          d-i mirror/http/hostname string mirrors.opensrc.us.ci
          d-i mirror/http/directory string /debian
          d-i mirror/http/proxy string

          d-i passwd/root-login boolean true
          d-i passwd/make-user boolean false
          d-i passwd/root-password password root
          d-i passwd/root-password-again password root

          d-i clock-setup/utc boolean true
          d-i time/zone string UTC

          d-i partman-auto/disk string /dev/vda
          d-i partman-auto/method string regular
          d-i partman-auto/choose_recipe select atomic
          d-i partman-partitioning/confirm_write_new_label boolean true
          d-i partman/choose_partition select finish
          d-i partman/confirm boolean true
          d-i partman/confirm_nooverwrite boolean true

          d-i apt-setup/non-free-firmware boolean true

          tasksel tasksel/first multiselect standard, ssh-server

          d-i pkgsel/include string openssh-server sudo git rsync findutils tar gzip unzip which curl jq wget file ca-certificates desktop-file-utils xdg-utils fakeroot dpkg-dev gcc make pkg-config libc6-dev libgcc-s1 libstdc++6 zlib1g libicu-dev libssl-dev libfontconfig1 libfreetype6

          popularity-contest popularity-contest/participate boolean false

          d-i grub-installer/only_debian boolean true
          d-i grub-installer/bootdev string /dev/vda

          d-i finish-install/reboot_in_progress note

          d-i preseed/late_command string \
            in-target sh -c 'echo "deb [trusted=yes] https://mirrors.opensrc.us.ci/debian trixie main contrib non-free non-free-firmware" > /etc/apt/sources.list'; \
            in-target sh -c 'echo "deb [trusted=yes] https://mirrors.opensrc.us.ci/debian-security trixie-security main contrib non-free non-free-firmware" >> /etc/apt/sources.list'; \
            in-target sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
            in-target sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
            in-target systemctl enable ssh; \
            in-target apt-get clean
          EOF

      - name: Inject preseed into initrd
        shell: bash
        run: |
          set -euo pipefail

          rm -rf initrd-work
          mkdir -p initrd-work

          cd initrd-work

          gzip -dc ../boot/initrd.gz | cpio -id --no-absolute-filenames

          cp ../preseed.cfg preseed.cfg

          find . | cpio -H newc -o | gzip -9 > ../boot/initrd-preseed.gz

          cd ..

          ls -lh boot/initrd-preseed.gz

      - name: Create qcow2 disk
        shell: bash
        run: |
          set -euo pipefail

          qemu-img create -f qcow2 "$QCOW2_IMAGE" "$IMAGE_SIZE"

          qemu-img info "$QCOW2_IMAGE"

      - name: Install Debian loong64 in full-system QEMU
        shell: bash
        timeout-minutes: 180
        run: |
          set -euo pipefail

          set +e

          qemu-system-loongarch64 \
            -machine virt \
            -cpu la464 \
            -m 8192 \
            -smp 4 \
            -kernel boot/vmlinux \
            -initrd boot/initrd-preseed.gz \
            -append "console=ttyS0 auto=true priority=critical preseed/file=/preseed.cfg" \
            -drive file="$QCOW2_IMAGE",if=virtio,format=qcow2 \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic 2>&1 | tee qemu-install.log

          QEMU_EXIT="${PIPESTATUS[0]}"

          set -e

          echo "QEMU installer exited: $QEMU_EXIT"

      - name: Boot installed qcow2 and verify SSH
        shell: bash
        timeout-minutes: 30
        run: |
          set -euo pipefail

          qemu-system-loongarch64 \
            -machine virt \
            -cpu la464 \
            -m 8192 \
            -smp 4 \
            -drive file="$QCOW2_IMAGE",if=virtio,format=qcow2 \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            > qemu-boot.log 2>&1 &

          QEMU_PID="$!"
          echo "$QEMU_PID" > qemu.pid

          for i in {1..180}; do
            if sshpass -p root ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p 2222 root@127.0.0.1 \
              'uname -m && cat /etc/debian_version'; then
              echo "VM ready"
              kill "$QEMU_PID" 2>/dev/null || true
              exit 0
            fi

            echo "Waiting for SSH..."
            sleep 5
          done

          echo "VM SSH not ready"
          tail -200 qemu-boot.log || true
          kill "$QEMU_PID" 2>/dev/null || true
          exit 1

      - name: Compress qcow2
        shell: bash
        run: |
          set -euo pipefail

          xz -T0 -9 "$QCOW2_IMAGE"

          sha256sum "${QCOW2_IMAGE}.xz" > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE != 'true' }}
          files: |
            ${{ env.QCOW2_IMAGE }}.xz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ github.token }}
