name: build Debian 13 loong64 qcow2

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release"
        required: true
        default: false
        type: boolean

      release_tag:
        description: "Release tag"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-qcow2:
    name: build loong64 qcow2
    runs-on: ubuntu-24.04

    env:
      ROOTFS_DIR: rootfs
      RAW_IMAGE: debian-trixie-loong64.raw
      QCOW2_IMAGE: debian-trixie-loong64.qcow2

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ inputs.release_tag }}"
          RELEASE="${{ inputs.release }}"

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE=${RELEASE}" >> "$GITHUB_ENV"

      - name: Prepare host tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            qemu-system-misc \
            qemu-utils \
            parted \
            gdisk \
            dosfstools \
            e2fsprogs \
            ovmf \
            debian-ports-archive-keyring \
            tar \
            xz-utils \
            rsync \
            curl \
            wget \
            jq \
            ca-certificates

          update-binfmts --display || true

      - name: Bootstrap Debian 13 loong64 rootfs
        shell: bash
        run: |
          set -euo pipefail

          sudo rm -rf "$ROOTFS_DIR"

          sudo debootstrap \
            --foreign \
            --arch=loong64 \
            --components=main,contrib,non-free,non-free-firmware \
            trixie \
            "$ROOTFS_DIR" \
            http://loong13.debian.net/debian-loong64/

          sudo cp /usr/bin/qemu-loongarch64-static \
            "$ROOTFS_DIR/usr/bin/"

          sudo chroot "$ROOTFS_DIR" \
            /debootstrap/debootstrap --second-stage

      - name: Configure rootfs
        shell: bash
        run: |
          set -euo pipefail

          sudo tee "$ROOTFS_DIR/etc/apt/sources.list" >/dev/null <<'EOF'
          deb [trusted=yes] http://loong13.debian.net/debian-loong64/ trixie main contrib non-free non-free-firmware
          deb [trusted=yes] http://loong13.debian.net/debian-loong64-security/ trixie-security main contrib non-free non-free-firmware
          EOF

          sudo mount -t proc proc "$ROOTFS_DIR/proc"
          sudo mount -t sysfs sys "$ROOTFS_DIR/sys"
          sudo mount --bind /dev "$ROOTFS_DIR/dev"
          sudo mount --bind /dev/pts "$ROOTFS_DIR/dev/pts"

          sudo chroot "$ROOTFS_DIR" bash -lc '
            set -euo pipefail

            export DEBIAN_FRONTEND=noninteractive

            apt-get update

            apt-get install -y \
              sudo \
              git \
              rsync \
              findutils \
              tar \
              gzip \
              unzip \
              which \
              curl \
              jq \
              wget \
              file \
              ca-certificates \
              desktop-file-utils \
              xdg-utils \
              fakeroot \
              dpkg-dev \
              gcc \
              make \
              pkg-config \
              libc6-dev \
              libgcc-s1 \
              libstdc++6 \
              zlib1g \
              libicu-dev \
              libssl-dev \
              libfontconfig1 \
              libfreetype6 \
              openssh-server \
              systemd-sysv \
              linux-image-loong64 \
              grub-efi-loong64

            echo "root:root" | chpasswd

            systemctl enable ssh || true

            apt-get clean

            rm -rf /var/lib/apt/lists/*
          '

          sudo umount -lf "$ROOTFS_DIR/dev/pts" || true
          sudo umount -lf "$ROOTFS_DIR/dev" || true
          sudo umount -lf "$ROOTFS_DIR/sys" || true
          sudo umount -lf "$ROOTFS_DIR/proc" || true

      - name: Create raw disk
        shell: bash
        run: |
          set -euo pipefail

          qemu-img create -f raw "$RAW_IMAGE" 20G

          LOOP="$(sudo losetup --find --show -P "$RAW_IMAGE")"

          echo "LOOP=$LOOP" >> "$GITHUB_ENV"

          sudo parted -s "$LOOP" mklabel gpt

          sudo parted -s "$LOOP" \
            mkpart ESP fat32 1MiB 513MiB

          sudo parted -s "$LOOP" set 1 esp on

          sudo parted -s "$LOOP" \
            mkpart primary ext4 513MiB 100%

          sudo partprobe "$LOOP"

          sleep 2

      - name: Format partitions
        shell: bash
        run: |
          set -euo pipefail

          EFI_PART="${LOOP}p1"
          ROOT_PART="${LOOP}p2"

          echo "EFI_PART=$EFI_PART" >> "$GITHUB_ENV"
          echo "ROOT_PART=$ROOT_PART" >> "$GITHUB_ENV"

          sudo mkfs.vfat -F32 "$EFI_PART"
          sudo mkfs.ext4 -F "$ROOT_PART"

      - name: Populate filesystem
        shell: bash
        run: |
          set -euo pipefail

          sudo mkdir -p /mnt/loongroot

          sudo mount "$ROOT_PART" /mnt/loongroot

          sudo mkdir -p /mnt/loongroot/boot/efi

          sudo mount "$EFI_PART" \
            /mnt/loongroot/boot/efi

          sudo rsync -aHAX \
            "$ROOTFS_DIR"/ \
            /mnt/loongroot/

      - name: Configure fstab
        shell: bash
        run: |
          set -euo pipefail

          ROOT_UUID="$(
            sudo blkid -s UUID -o value "$ROOT_PART"
          )"

          EFI_UUID="$(
            sudo blkid -s UUID -o value "$EFI_PART"
          )"

          sudo tee /mnt/loongroot/etc/fstab >/dev/null <<EOF
          UUID=${ROOT_UUID} / ext4 defaults 0 1
          UUID=${EFI_UUID} /boot/efi vfat umask=0077 0 1
          EOF

      - name: Install GRUB EFI
        shell: bash
        run: |
          set -euo pipefail

          sudo mount -t proc proc /mnt/loongroot/proc
          sudo mount -t sysfs sys /mnt/loongroot/sys
          sudo mount --bind /dev /mnt/loongroot/dev
          sudo mount --bind /dev/pts /mnt/loongroot/dev/pts

          sudo chroot /mnt/loongroot bash -lc '
            set -euo pipefail

            grub-install \
              --target=loongarch64-efi \
              --efi-directory=/boot/efi \
              --bootloader-id=debian \
              --removable

            update-grub
          '

          sudo umount -lf /mnt/loongroot/dev/pts || true
          sudo umount -lf /mnt/loongroot/dev || true
          sudo umount -lf /mnt/loongroot/sys || true
          sudo umount -lf /mnt/loongroot/proc || true

      - name: Cleanup mounts
        if: always()
        shell: bash
        run: |
          sudo umount -lf /mnt/loongroot/boot/efi || true
          sudo umount -lf /mnt/loongroot || true

      - name: Detach loop
        if: always()
        shell: bash
        run: |
          sudo losetup -d "$LOOP" || true

      - name: Convert qcow2
        shell: bash
        run: |
          set -euo pipefail

          qemu-img convert \
            -f raw \
            -O qcow2 \
            "$RAW_IMAGE" \
            "$QCOW2_IMAGE"

          qemu-img info "$QCOW2_IMAGE"

      - name: Compress qcow2
        shell: bash
        run: |
          set -euo pipefail

          xz -T0 -9 "$QCOW2_IMAGE"

          sha256sum "${QCOW2_IMAGE}.xz" > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE != 'true' }}

          files: |
            ${{ env.QCOW2_IMAGE }}.xz
            SHA256SUMS

        env:
          GITHUB_TOKEN: ${{ github.token }}
